<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔮 Пълно Таро · разширена информация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2f28;
            background: radial-gradient(circle at 30% 20%, #2f5545, #172b23);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            padding: 16px 10px 30px 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 620px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .header {
            background: #ece0cfed;
            backdrop-filter: blur(4px);
            border-radius: 56px 56px 30px 30px;
            padding: 22px 16px;
            text-align: center;
            border: 2px solid #dab58c;
            box-shadow: 0 12px 18px #0a1f1b;
        }

        .header h1 {
            font-size: 2.3rem;
            color: #262f1f;
            text-shadow: 2px 2px 0 #c4ab89;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .header .sub {
            background: #b79d7c;
            border-radius: 36px;
            padding: 6px 16px;
            color: #f8f0dc;
            font-size: 1.2rem;
            display: inline-block;
            font-weight: 500;
        }

        /* обща лента с бутоните – разделена на две части за прегледност */
        .buttons-section {
            background: #cfbea7b0;
            backdrop-filter: blur(3px);
            border-radius: 48px 48px 28px 28px;
            padding: 22px 12px 16px 12px;
            border: 2px solid #cfa97e;
        }

        .button-group-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2e3323;
            padding-left: 12px;
            margin-bottom: 8px;
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            background: #e9d9c466;
            border-radius: 60px;
            padding: 16px 8px;
        }

        .num-btn {
            width: 58px;
            height: 58px;
            border-radius: 40px;
            background: #faf0de;
            border: 3px solid #7d6850;
            box-shadow: 0 5px 0 #5f4f3a, 0 6px 10px #23362e;
            font-size: 1.7rem;
            font-weight: 700;
            color: #1d392e;
            cursor: pointer;
            transition: 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            flex-shrink: 0;
        }

        .num-btn.major { background: #f7ddbb; border-color: #b4824a; box-shadow: 0 5px 0 #83653d; }
        .num-btn.special { background: #fbddb5; border-color: #aa733f; } /* 11-14 */

        .num-btn.active {
            background: #dbb68a;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5f4f3a, 0 5px 10px #1e332b;
        }

        /* информационен панел */
        .info-panel {
            background: #fcf3e5f5;
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 26px 18px;
            border: 2px solid #dab58c;
            box-shadow: 0 14px 18px #0d221d;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            column-gap: 15px;
            row-gap: 8px;
            margin-bottom: 18px;
            background: #e7d6bc;
            padding: 12px 20px;
            border-radius: 40px;
        }

        .card-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #3b2c1a;
        }

        .card-name {
            font-size: 2.0rem;
            color: #1e4a3a;
            font-weight: 600;
        }

        .keyword {
            background: #ccb191;
            border-radius: 30px;
            padding: 5px 20px;
            font-size: 1.4rem;
            color: #2d281d;
            font-weight: 500;
        }

        .meaning-box {
            background: #f5e7d3;
            border-radius: 38px;
            padding: 20px 18px;
            border: 2px solid #ddbc95;
            font-size: 1.15rem;
            line-height: 1.5;
            color: #2d3b2a;
            box-shadow: inset 0 2px 6px #cfb392;
            font-weight: 400;
        }

        .sub-cards {
            margin-top: 24px;
        }

        .sub-title {
            font-size: 1.6rem;
            background: #b29878;
            border-radius: 40px;
            padding: 6px 20px;
            color: #fef5e3;
            display: inline-block;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .minor-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .minor-item {
            background: #f7ead7;
            border-radius: 28px 28px 20px 20px;
            padding: 14px 18px;
            border: 1px solid #dbbc99;
            box-shadow: 0 4px 0 #947e62;
        }

        .minor-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .minor-element {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4d3a28;
        }

        .minor-name {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .minor-desc {
            font-size: 1.05rem;
            background: #fcf2df;
            border-radius: 24px;
            padding: 12px 16px;
            border: 1px solid #e1c5a2;
            font-weight: 400;
            line-height: 1.5;
        }

        .wands .minor-name { color: #b6491a; }
        .cups .minor-name { color: #146b7c; }
        .swords .minor-name { color: #7a533a; }
        .pentacles .minor-name { color: #287a48; }

        .footer {
            color: #eddfcb;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* разширени описания – допълнителна подредба */
        .extra-desc {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #b3926e;
            font-size: 1.05rem;
        }
        .extra-desc strong {
            color: #3b5c48;
        }

        @media (max-width: 480px) {
            .num-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .card-name { font-size: 1.6rem; }
        }
    </style>
</head>

        const majorGrid = document.getElementById('majorGrid');

        // Големи аркани 0-21
        for (let i = 0; i <= 21; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn major';
            btn.setAttribute('data-num', i);
            btn.textContent = i === 0 ? '0' : i;

        // Малки аркани 1-14 (всяка боя има по 14 карти, но ще показваме примерни)
        // За по-лесно: създаваме бутони 1-14, но при клик показваме данни за съответната боя? 
        // В нашия случай ще покажем всички 14 за една боя? Нека направим нещо по-хитро:
        // Тъй като имаме 4 бои × 14 = 56 карти, няма как да ги поберем в 14 бутона.
        // Затова създаваме 14 бутона и показваме за избраното число всички карти от този номер (Асо,2,3..10,Паж,Рицар,Кралица,Крал) 
        // Но това би било твърде много. Вместо това ще покажем само една примерна карта – нека изберем Жезли за демо.
        // Тъй като имаме данни за всички, ще направим така: при клик на число 1 показваме Асо Жезли, Асо Чаши, Асо Мечове, Асо Пентакли.
        // Това е най-логичното – всички карти със същото число от четирите бои.

        // Създаваме бутони 1-14
        for (let i = 1; i <= 14; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            if (i >= 11) btn.classList.add('special');
            btn.setAttribute('data-num', i);
            btn.textContent = i;
            btn.addEventListener('click', function() {
                setActive(btn);
                showAllSuitsForNumber(i);
            });
            minorGrid.appendChild(btn);
        }

        function setActive(clickedBtn) {
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');
        }

        // ----- ПОКАЗВАНЕ НА ГОЛЯМА АРКАНА -----
        function showMajor(index) {
            const card = majorData[index];
            if (!card) return;
            const html = `
                <div class="card-header">
                    <span class="card-number">${index === 0 ? '0' : index}</span>
                    <span class="card-name">${card.name}</span>
                    <span class="keyword">${card.keyword}</span>
                </div>
                <div class="meaning-box">${card.meaning}</div>
            `;
            infoPanel.innerHTML = html;
        }

        // ----- ПОКАЗВАНЕ НА ЧЕТИТЕ КАРТИ ЗА ДАДЕНО ЧИСЛО (1-14) -----
        function showAllSuitsForNumber(num) {
            // Събираме всички карти с този номер от четирите бои
            const cards = [];
            for (let key in minorData) {
                if (minorData[key].number == num) {
                    cards.push(minorData[key]);
                }
            }
            // Подреждаме ги по боя (wands, cups, swords, pentacles)
            cards.sort((a,b) => {
                const order = { wands:1, cups:2, swords:3, pentacles:4 };
                return order[a.suit] - order[b.suit];
            });

            if (cards.length === 0) {
                infoPanel.innerHTML = `<div style="padding:20px;text-align:center;">Няма данни за число ${num}</div>`;
                return;
            }

            let html = `
                <div class="card-header">
                    <span class="card-number">${num}</span>
                    <span class="keyword">${num==1?'Асо':num==11?'Паж':num==12?'Рицар':num==13?'Кралица':num==14?'Крал':num+' число'}</span>
                </div>
                <div class="sub-cards">
                    <div class="sub-title">⚡ Четирите бои</div>
                    <div class="minor-grid">
            `;

            cards.forEach(card => {
                let suitName = '';
                if (card.suit === 'wands') suitName = 'Жезли (Огън)';
                else if (card.suit === 'cups') suitName = 'Чаши (Вода)';
                else if (card.suit === 'swords') suitName = 'Мечове (Въздух)';
                else if (card.suit === 'pentacles') suitName = 'Пентакли (Земя)';

                html += `
                    <div class="minor-item ${card.suit}">
                        <div class="minor-head">
                            <span class="minor-element">${suitName}</span>
                            <span class="minor-name">${card.name}</span>
                            <span style="background:#dac09a; border-radius:30px; padding:2px 10px;">${card.nick}</span>
                        </div>
                        <div class="minor-desc">${card.desc}</div>
                    </div>
                `;
            });

            html += `</div></div>`;
            infoPanel.innerHTML = html;
        }

        // Покажи Глупака при старт
        setTimeout(() => {
            const defaultBtn = document.querySelector('.num-btn.major[data-num="0"]');
            if (defaultBtn) {
                defaultBtn.classList.add('active');
                showMajor(0);
            } else {
                showMajor(0);

        }, 50);
