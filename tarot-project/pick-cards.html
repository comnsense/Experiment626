<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔮 Избери 5 карти · Таро тълкуване</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* допълнителни стилове за страницата за избор */
        .two-columns {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        @media (min-width: 800px) {
            .two-columns {
                flex-direction: row;
            }
            .cards-browser {
                flex: 2;
            }
            .selected-panel {
                flex: 1;
            }
        }
        
        .cards-browser {
            background: #cfbea7b0;
            backdrop-filter: blur(3px);
            border-radius: 48px 48px 28px 28px;
            padding: 22px 12px;
            border: 2px solid #cfa97e;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 18px;
            border-radius: 40px;
            border: 2px solid #7d6850;
            background: #faf0de;
            font-size: 1.1rem;
            font-family: 'Nunito', sans-serif;
            margin-bottom: 15px;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            background: #e9d9c466;
            border-radius: 30px;
        }
        
        .browser-card {
            background: #fcf3e5;
            border-radius: 20px;
            padding: 12px 8px;
            border: 2px solid #dab58c;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
            font-size: 0.95rem;
            box-shadow: 0 3px 0 #9b8569;
        }
        
        .browser-card:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        
        .browser-card.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.7);
        }
        
        .browser-card.selected {
            background: #dbb68a;
            border-color: #8a6d4b;
            box-shadow: 0 3px 0 #6b553b;
        }
        
        .browser-card .card-suit {
            font-size: 0.8rem;
            background: #e7d6bc;
            border-radius: 20px;
            padding: 2px 6px;
            display: inline-block;
            margin-top: 4px;
        }
        
        .selected-panel {
            background: #fcf3e5f5;
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 22px 16px;
            border: 2px solid #dab58c;
        }
        
        .selected-header {
            font-size: 1.6rem;
            font-weight: 600;
            color: #3b2c1a;
            margin-bottom: 15px;
            background: #e7d6bc;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
        }
        
        .selected-list {
            min-height: 200px;
            background: #e9d9c466;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .selected-item {
            background: #dbb68a;
            border-radius: 25px;
            padding: 10px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #8a6d4b;
        }
        
        .remove-btn {
            background: #b6491a;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .action-btn {
            background: #b29878;
            border: 2px solid #7d623c;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fef5e3;
            cursor: pointer;
            transition: 0.1s;
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 0 #5f4f3a;
            flex: 1;
            min-width: 140px;
        }
        
        .action-btn.secondary {
            background: #ccb191;
            color: #2e3323;
        }
        
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .counter {
            font-size: 1.2rem;
            color: #2e3323;
            text-align: center;
            margin: 10px 0;
        }
        
        .wands-bg { border-left: 5px solid #b6491a; }
        .cups-bg { border-left: 5px solid #146b7c; }
        .swords-bg { border-left: 5px solid #7a533a; }
        .pentacles-bg { border-left: 5px solid #287a48; }
        .major-bg { border-left: 5px solid #9b6b43; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 ИЗБЕРИ 5 КАРТИ</h1>
            <div class="sub">ръчно избери до 5 карти · получи тълкувание</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Всички карти</a>
                <a href="five-cards.html" class="nav-link">Случайни</a>
                <a href="pick-cards.html" class="nav-link active">Избери</a>
            </div>
        </div>

        <div class="two-columns">
            <!-- лява колона: браузър на карти -->
            <div class="cards-browser">
                <div class="button-group-label">📚 Всички карти (кликни за избор)</div>
                <input type="text" class="search-box" id="searchBox" placeholder="Търси по име или ключова дума...">
                <div class="cards-grid" id="cardsGrid">
                    <!-- картите ще се генерират от JS -->
                </div>
            </div>

            <!-- дясна колона: избрани карти -->
            <div class="selected-panel">
                <div class="selected-header">📋 Моите карти</div>
                <div class="counter" id="counter">0 / 5 избрани</div>
                <div class="selected-list" id="selectedList">
                    <!-- избраните карти ще се показват тук -->
                    <div style="text-align: center; color: #9b8569; padding: 20px;">Все още нямаш избрани карти</div>
                </div>
                
                <div class="pick-actions">
                    <button class="action-btn" id="interpretBtn" disabled>🔮 Тълкувай</button>
                    <button class="action-btn secondary" id="clearSelectedBtn">✖️ Изчисти</button>
                </div>

                <!-- панел за тълкувание (първоначално скрит) -->
                <div id="interpretationPanel" style="display: none; margin-top: 20px;">
                    <div class="interpretation-header" style="font-size: 1.4rem;">📜 Тълкувание</div>
                    <div class="interpretation-content" id="pickInterpretation"></div>
                </div>
            </div>
        </div>

        <div class="footer">❖ Избери до 5 карти · кликни върху тях за преглед ❖</div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/pick-cards.js"></script>
</body>
</html>
