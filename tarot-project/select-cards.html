<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1D263B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="author" content="comnsnense">
    <meta name="copyright" content="comnsnense 2026">
    <title>🔮 Избери карти · Таро · comnsnense</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <i class="fas fa-crystal-ball"></i> Таро
        </a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">
            <i class="fas fa-bars"></i>
        </button>
        <nav>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html"><i class="fas fa-layer-group"></i> Всички карти</a></li>
                <li class="nav-item"><a href="five-cards.html"><i class="fas fa-hand"></i> Тегли</a></li>
                <li class="nav-item"><a href="select-cards.html" class="active"><i class="fas fa-check-double"></i> Избери</a></li>
                <li class="theme-switch-wrapper">
                    <span class="theme-icon"><i class="fas fa-sun"></i></span>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="theme-icon"><i class="fas fa-moon"></i></span>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Container -->
    <div class="container">
        <div class="info-card">
            <div class="card-title">
                <i class="fas fa-check-double"></i> Избери карти
            </div>
            <div style="text-align: center; padding: 3rem 1rem; color: var(--text-secondary);">
                <i class="fas fa-tools" style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6;"></i>
                <h3 style="margin-bottom: 1rem; color: var(--accent);">Страницата е в процес на разработка</h3>
                <p>Ще можете да избирате конкретни карти и да виждате техните значения.</p>
                <p style="margin-top: 2rem;">
                    <a href="index.html" class="btn"><i class="fas fa-layer-group"></i> Към всички карти</a>
                    <a href="five-cards.html" class="btn" style="margin-left: 1rem;"><i class="fas fa-hand"></i> Към теглене</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p><i class="fas fa-copyright"></i> 2026 · comnsnense · Всички права запазени</p>
        <div class="footer-column">
            <ul class="social-links">
                <li class="social-link"><a href="mailto:comnsense17@gmail.com"><i class="fas fa-envelope"></i></a></li>
                <li class="social-link"><a href="https://t.me/comnsense88"><i class="fab fa-telegram-plane"></i></a></li>
                <li class="social-link"><a href="https://cv-mirela.netlify.app/"><i class="fas fa-globe"></i></a></li>
                <li class="social-link"><a href="https://www.linkedin.com/in/comnsense"><i class="fab fa-linkedin-in"></i></a></li>
            </ul>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                htmlElement.setAttribute('data-theme', 'light');
                themeToggle.checked = true;
            }
            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    htmlElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                }
            });

            // Mobile menu
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navMenu = document.getElementById('navMenu');
            mobileMenuBtn.addEventListener('click', function() {
                navMenu.classList.toggle('show');
                const icon = this.querySelector('i');
                if (navMenu.classList.contains('show')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        });
    </script>
</body>
</html>
