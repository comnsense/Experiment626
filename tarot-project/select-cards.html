<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1D263B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="author" content="comnsnense">
    <meta name="copyright" content="comnsnense 2026">
    <title>🔮 Избери карти · Таро · comnsnense</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Специфични стилове за select-cards */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        
        .action-buttons.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        
        .action-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }
        
        .action-btn.show-btn {
            background: linear-gradient(145deg, var(--accent), var(--accent-hover));
            color: white;
        }
        
        .action-btn.reset-btn {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        .action-btn i {
            font-size: 1.2rem;
        }
        
        .selection-counter {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .selection-counter span {
            background-color: var(--skill-bg);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
        }
        
        .selection-counter .count-highlight {
            color: var(--accent);
            font-size: 2rem;
            margin: 0 0.5rem;
        }
        
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                gap: 0.8rem;
            }
            
            .action-btn {
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <i class="fas fa-crystal-ball"></i> Таро
        </a>
        
        <!-- Mobile menu button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">
            <i class="fas fa-bars"></i>
        </button>

        <nav>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html"><i class="fas fa-layer-group"></i> Всички карти</a></li>
                <li class="nav-item"><a href="five-cards.html"><i class="fas fa-hand"></i> Тегли</a></li>
                <li class="nav-item"><a href="select-cards.html" class="active"><i class="fas fa-check-double"></i> Избери</a></li>
                <li class="theme-switch-wrapper">
                    <span class="theme-icon"><i class="fas fa-sun"></i></span>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="theme-icon"><i class="fas fa-moon"></i></span>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Container -->
    <div class="container">
        <div class="info-card">
            <div class="card-title">
                <i class="fas fa-check-double"></i> Избери карти
            </div>
            
            <!-- Търсене и филтриране -->
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;">
                    <input type="text" id="searchInput" placeholder="🔍 Търси карта..." 
                           style="flex: 1; padding: 0.8rem 1.2rem; border-radius: 30px; 
                                  border: 2px solid var(--border-color); 
                                  background-color: var(--bg-secondary); 
                                  color: var(--text-primary); font-size: 1rem;">
                    <select id="suitFilter" 
                            style="padding: 0.8rem 1.2rem; border-radius: 30px; 
                                   border: 2px solid var(--border-color); 
                                   background-color: var(--bg-secondary); 
                                   color: var(--text-primary); font-size: 1rem;">
                        <option value="all">Всички бои</option>
                        <option value="major">Големи аркани</option>
                        <option value="wands">Жезли (Огън)</option>
                        <option value="cups">Чаши (Вода)</option>
                        <option value="swords">Мечове (Въздух)</option>
                        <option value="pentacles">Пентакли (Земя)</option>
                    </select>
                </div>
                
                <!-- Брояч на избрани карти -->
                <div class="selection-counter">
                    <span>
                        <i class="fas fa-check-circle" style="color: var(--accent);"></i>
                        Избрани: <span id="selectedCount" class="count-highlight">0</span> / 5
                    </span>
                </div>
                
                <!-- Бутони за действие (появяват се при 5 избрани карти) -->
                <div id="actionButtons" class="action-buttons">
                    <button class="action-btn show-btn" id="showSelectedBtn">
                        <i class="fas fa-eye"></i> Покажи избраните карти
                    </button>
                    <button class="action-btn reset-btn" id="resetSelectionBtn">
                        <i class="fas fa-redo-alt"></i> Нулирай избора
                    </button>
                </div>
            </div>

            <!-- Списък с карти за избиране (grid) -->
            <div id="cardsList" class="cards-grid"></div>

            <!-- Панел за показване на избраните карти -->
            <div id="selectedCardsPanel" style="margin-top: 2rem; display: none;">
                <div class="card-title" style="font-size: 1.3rem; margin-bottom: 1rem;">
                    <i class="fas fa-check-circle" style="color: var(--accent);"></i> Избрани карти
                    <span id="selectedCountDetail" style="font-size: 1rem; margin-left: 1rem; color: var(--text-secondary);"></span>
                </div>
                
                <!-- Хоризонтален скрол на избраните карти -->
                <div id="selectedCardsList" class="selected-cards-horizontal"></div>
                
                <!-- Тълкувание на избраните карти -->
                <div class="interpretation-panel" style="margin-top: 1rem; padding: 1.5rem; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px;">
                    <div style="font-size: 1.3rem; color: var(--accent); margin-bottom: 1rem;">
                        <i class="fas fa-scroll"></i> Тълкувание
                    </div>
                    <div id="selectedInterpretation" style="color: var(--text-secondary); line-height: 1.6;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>
            <i class="fas fa-copyright"></i> 2026 · comnsnense · Всички права запазени
        </p>
        <div class="footer-column">
            <ul class="social-links">
                <li class="social-link">
                    <a href="mailto:comnsense17@gmail.com" aria-label="Email" target="_blank" rel="noopener">
                        <i class="fas fa-envelope"></i>
                    </a>
                </li>
                <li class="social-link">
                    <a href="https://t.me/comnsense88" aria-label="Telegram" target="_blank" rel="noopener">
                        <i class="fab fa-telegram-plane"></i>
                    </a>
                </li>
                <li class="social-link">
                    <a href="https://cv-mirela.netlify.app/" aria-label="Website" target="_blank" rel="noopener">
                        <i class="fas fa-globe"></i>
                    </a>
                </li>
                <li class="social-link">
                    <a href="https://www.linkedin.com/in/comnsense" aria-label="LinkedIn" target="_blank" rel="noopener">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </li>
            </ul>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== ТЕМА =====
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                htmlElement.setAttribute('data-theme', 'light');
                themeToggle.checked = true;
            }

            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    htmlElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                }
            });

            // ===== МОБИЛНО МЕНЮ =====
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navMenu = document.getElementById('navMenu');
            
            mobileMenuBtn.addEventListener('click', function() {
                navMenu.classList.toggle('show');
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });

            document.querySelectorAll('.nav-item a').forEach(link => {
                link.addEventListener('click', function() {
                    navMenu.classList.remove('show');
                    const icon = mobileMenuBtn.querySelector('i');
                    icon.classList.add('fa-bars');
                    icon.classList.remove('fa-times');
                });
            });

            // ===== ПОМОЩНИ ФУНКЦИИ ЗА ИЗОБРАЖЕНИЯ =====
            
            function getEnglishRank(number) {
                const ranks = {
                    1: 'ace', 2: 'two', 3: 'three', 4: 'four', 5: 'five',
                    6: 'six', 7: 'seven', 8: 'eight', 9: 'nine', 10: 'ten',
                    11: 'page', 12: 'knight', 13: 'queen', 14: 'king'
                };
                return ranks[number] || 'card';
            }

            function getEnglishName(bgName) {
                const names = {
                    'Глупакът': 'fool',
                    'Магьосникът': 'magician',
                    'Върховната жрица': 'high-priestess',
                    'Императрицата': 'empress',
                    'Императорът': 'emperor',
                    'Йерофантът': 'hierophant',
                    'Влюбените': 'lovers',
                    'Колесницата': 'chariot',
                    'Силата': 'strength',
                    'Отшелникът': 'hermit',
                    'Колелото на съдбата': 'wheel-of-fortune',
                    'Справедливост': 'justice',
                    'Обесеният': 'hanged-man',
                    'Смърт': 'death',
                    'Умереност': 'temperance',
                    'Дяволът': 'devil',
                    'Кулата': 'tower',
                    'Звездата': 'star',
                    'Луната': 'moon',
                    'Слънцето': 'sun',
                    'Съд': 'judgement',
                    'Светът': 'world'
                };
                return names[bgName] || bgName.toLowerCase().replace(/[^a-z0-9]/g, '-');
            }

            function getCardImagePath(card) {
                if (!card) return 'images/placeholder.jpg';
                
                if (card.type === 'major') {
                    const num = card.number.toString().padStart(2, '0');
                    const nameEn = getEnglishName(card.name);
                    return `images/major-${num}-${nameEn}.jpg`;
                } else {
                    const num = card.number.toString().padStart(2, '0');
                    const rankEn = getEnglishRank(card.number);
                    return `images/${card.suit}-${num}-${rankEn}.jpg`;
                }
            }

            function getSuitName(card) {
                if (card.type === 'major') return 'Голям аркан';
                const suits = {
                    'wands': 'Жезли',
                    'cups': 'Чаши',
                    'swords': 'Мечове',
                    'pentacles': 'Пентакли'
                };
                return suits[card.suit] || card.suit;
            }

            function getDisplayNumber(card) {
                if (card.type === 'major') {
                    return card.number === 0 ? '0' : card.number.toString();
                } else {
                    const roman = ['0', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII', 'XIII', 'XIV'];
                    return roman[card.number] || card.number.toString();
                }
            }

            // ===== ОСНОВНА ЛОГИКА ЗА ИЗБИРАНЕ =====
            
            const cardsList = document.getElementById('cardsList');
            const searchInput = document.getElementById('searchInput');
            const suitFilter = document.getElementById('suitFilter');
            const selectedCountSpan = document.getElementById('selectedCount');
            const actionButtons = document.getElementById('actionButtons');
            const showSelectedBtn = document.getElementById('showSelectedBtn');
            const resetSelectionBtn = document.getElementById('resetSelectionBtn');
            const selectedCardsPanel = document.getElementById('selectedCardsPanel');
            const selectedCardsList = document.getElementById('selectedCardsList');
            const selectedInterpretation = document.getElementById('selectedInterpretation');
            const selectedCountDetail = document.getElementById('selectedCountDetail');

            let selectedCards = JSON.parse(sessionStorage.getItem('selectedCards') || '[]');

            // Зареждане на всички карти
            loadAllCards();

            // Event listeners
            searchInput.addEventListener('input', filterCards);
            suitFilter.addEventListener('change', filterCards);
            showSelectedBtn.addEventListener('click', showSelectedCards);
            resetSelectionBtn.addEventListener('click', resetSelection);

            function loadAllCards() {
                let html = '';
                allCards.forEach(card => {
                    const isSelected = selectedCards.some(c => c.id === card.id);
                    const imagePath = getCardImagePath(card);
                    
                    html += `
                        <div class="selectable-card ${isSelected ? 'selected' : ''}" data-card-id="${card.id}">
                            <div class="card-image-container">
                                <img src="${imagePath}" 
                                     alt="${card.name}"
                                     class="card-image"
                                     loading="lazy"
                                     onerror="this.src='images/placeholder.jpg'; this.onerror=null;">
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                                <span class="card-number-badge">${getDisplayNumber(card)}</span>
                                <span class="card-suit-badge">${getSuitName(card)}</span>
                            </div>
                            
                            <div class="card-name">${card.name}</div>
                            <div class="card-keyword">${card.keyword}</div>
                            
                            ${isSelected ? '<div class="selected-check"><i class="fas fa-check"></i></div>' : ''}
                        </div>
                    `;
                });
                
                cardsList.innerHTML = html;
                
                document.querySelectorAll('.selectable-card').forEach(cardEl => {
                    cardEl.addEventListener('click', function() {
                        const cardId = this.getAttribute('data-card-id');
                        toggleSelectCard(cardId);
                    });
                });
                
                updateSelectedCount();
                checkActionButtonsVisibility();
            }

            function toggleSelectCard(cardId) {
                const cardData = allCards.find(c => c.id == cardId);
                if (!cardData) return;
                
                const index = selectedCards.findIndex(c => c.id === cardId);
                
                if (index === -1) {
                    // Добавяне на карта
                    if (selectedCards.length < 5) {
                        selectedCards.push(cardData);
                    } else {
                        alert('Може да изберете максимум 5 карти!');
                        return;
                    }
                } else {
                    // Премахване на карта
                    selectedCards.splice(index, 1);
                }
                
                // Запазване в sessionStorage
                sessionStorage.setItem('selectedCards', JSON.stringify(selectedCards));
                
                // Актуализиране на визуалния стил
                const cardEl = document.querySelector(`.selectable-card[data-card-id="${cardId}"]`);
                if (cardEl) {
                    if (index === -1) {
                        cardEl.classList.add('selected');
                        if (!cardEl.querySelector('.selected-check')) {
                            const check = document.createElement('div');
                            check.className = 'selected-check';
                            check.innerHTML = '<i class="fas fa-check"></i>';
                            cardEl.appendChild(check);
                        }
                    } else {
                        cardEl.classList.remove('selected');
                        const check = cardEl.querySelector('.selected-check');
                        if (check) check.remove();
                    }
                }
                
                updateSelectedCount();
                checkActionButtonsVisibility();
                
                // Ако панелът е отворен, го затваряме
                selectedCardsPanel.style.display = 'none';
            }

            function updateSelectedCount() {
                selectedCountSpan.textContent = selectedCards.length;
            }

            function checkActionButtonsVisibility() {
                if (selectedCards.length === 5) {
                    actionButtons.classList.add('visible');
                } else {
                    actionButtons.classList.remove('visible');
                }
            }

            function filterCards() {
                const searchTerm = searchInput.value.toLowerCase();
                const filter = suitFilter.value;
                
                document.querySelectorAll('.selectable-card').forEach(card => {
                    const cardId = card.getAttribute('data-card-id');
                    const cardData = allCards.find(c => c.id == cardId);
                    
                    if (!cardData) return;
                    
                    const matchesSearch = cardData.name.toLowerCase().includes(searchTerm) || 
                                         (cardData.keyword && cardData.keyword.toLowerCase().includes(searchTerm));
                    
                    let matchesSuit = true;
                    if (filter !== 'all') {
                        if (filter === 'major') {
                            matchesSuit = cardData.type === 'major';
                        } else {
                            matchesSuit = cardData.suit === filter;
                        }
                    }
                    
                    card.style.display = matchesSearch && matchesSuit ? 'flex' : 'none';
                });
            }

            function showSelectedCards() {
                if (selectedCards.length === 0) return;
                
                selectedCountDetail.textContent = `(${selectedCards.length} карти)`;
                
                // Показване на избраните карти хоризонтално
                let html = '';
                selectedCards.forEach((card, index) => {
                    const imagePath = getCardImagePath(card);
                    
                    html += `
                        <div class="selected-card-item" onclick="removeSelectedCard(${index})">
                            <div class="card-image-container" style="margin-bottom: 0.3rem;">
                                <img src="${imagePath}" alt="${card.name}" class="card-image" onerror="this.src='images/placeholder.jpg';">
                            </div>
                            <div class="card-name" style="font-size: 0.8rem;">${card.name}</div>
                            <div class="selected-card-number">${index + 1}</div>
                            <div class="selected-card-remove"><i class="fas fa-times"></i></div>
                        </div>
                    `;
                });
                
                selectedCardsList.innerHTML = html;
                
                // Тълкувание
                const allKeywords = selectedCards.map(c => c.keyword).join(' · ');
                let interpretationHtml = `
                    <div style="background: linear-gradient(145deg, var(--skill-bg), var(--bg-card)); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                        <strong style="color: var(--accent);">🔑 Ключови думи:</strong>
                        <p style="margin-top: 0.5rem;">${allKeywords}</p>
                    </div>
                `;
                
                selectedCards.forEach((card, i) => {
                    interpretationHtml += `
                        <div style="margin-bottom: 1rem; padding: 1rem; background-color: var(--bg-card); border-radius: 12px; border-left: 4px solid var(--accent);">
                            <strong style="color: var(--accent);">${i+1}. ${card.name}</strong>
                            <p style="margin-top: 0.3rem;">${card.meaning}</p>
                        </div>
                    `;
                });
                
                selectedInterpretation.innerHTML = interpretationHtml;
                selectedCardsPanel.style.display = 'block';
                
                // Скрол до панела
                selectedCardsPanel.scrollIntoView({ behavior: 'smooth' });
            }

            function resetSelection() {
                selectedCards = [];
                sessionStorage.removeItem('selectedCards');
                
                // Премахване на селекцията от всички карти
                document.querySelectorAll('.selectable-card').forEach(card => {
                    card.classList.remove('selected');
                    const check = card.querySelector('.selected-check');
                    if (check) check.remove();
                });
                
                updateSelectedCount();
                checkActionButtonsVisibility();
                selectedCardsPanel.style.display = 'none';
            }

            // Глобална функция за премахване на карта от избраните
            window.removeSelectedCard = function(index) {
                const cardId = selectedCards[index].id;
                selectedCards.splice(index, 1);
                sessionStorage.setItem('selectedCards', JSON.stringify(selectedCards));
                
                // Актуализиране на визуалния стил
                const cardEl = document.querySelector(`.selectable-card[data-card-id="${cardId}"]`);
                if (cardEl) {
                    cardEl.classList.remove('selected');
                    const check = cardEl.querySelector('.selected-check');
                    if (check) check.remove();
                }
                
                updateSelectedCount();
                checkActionButtonsVisibility();
                
                if (selectedCards.length > 0) {
                    showSelectedCards();
                } else {
                    selectedCardsPanel.style.display = 'none';
                }
            };
        });
    </script>
</body>
</html>
