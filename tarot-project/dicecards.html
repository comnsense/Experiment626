<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1D263B">
    <meta name="author" content="comnsnense">
    <meta name="copyright" content="comnsnense 2026">
    <title>🔮 Таро Зарове · Случайни карти</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Стилове за изображения */
        .card-image-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 0.5rem;
        }
        
        .card-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        
        .card-item {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .card-item:hover .card-image {
            transform: scale(1.05);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .card-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .card-suit {
            padding: 0.2rem 0.6rem;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }
        
        .suit-major { background-color: var(--major); }
        .suit-wands { background-color: var(--wands); }
        .suit-cups { background-color: var(--cups); }
        .suit-swords { background-color: var(--swords); }
        .suit-pentacles { background-color: var(--pentacles); }
        
        .card-keywords {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
        }
        
        .card-meaning {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 0.8rem;
        }
        
        /* Стилове за тълкуване */
        .interpretation-card-detail {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            align-items: center;
            transition: transform 0.2s ease;
        }
        
        .interpretation-card-detail:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }
        
        .interpretation-card-image {
            width: 60px;
            height: 90px;
            object-fit: contain;
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .interpretation-card-info {
            flex: 1;
        }
        
        .interpretation-card-name {
            font-weight: 700;
            color: var(--accent);
            font-size: 1rem;
        }
        
        .interpretation-card-keywords {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 0.2rem 0;
        }
        
        .interpretation-card-meaning {
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
        }
        
        .interpretation-section {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background-color: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            transition: all 0.2s ease;
        }
        
        .interpretation-section:hover {
            background-color: var(--bg-card);
        }
        
        .rule-tag {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        
        .interpretation-title {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .interpretation-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .rule-advice {
            color: var(--success);
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 0.3rem;
        }
        
        .timeline-item {
            margin-bottom: 0.3rem;
        }
        
        /* Бутони */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .action-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .action-btn.draw-btn {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent-hover);
        }
        
        .action-btn.draw-btn:hover {
            background-color: var(--accent-hover);
        }
        
        .action-btn.clear-btn {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .action-btn.clear-btn:hover {
            background-color: #ff6666;
            border-color: #ff6666;
        }
        
        /* Секции */
        .interpretation-rules {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            border: 2px solid var(--accent);
        }
        
        .interpretation-rules-header {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .cards-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--border-color);
        }
        
        .cards-section-header {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Popup прозорец */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            background-color: var(--bg-secondary);
            border: 3px solid var(--accent);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        .popup-overlay.active .popup-content {
            transform: scale(1);
        }
        
        .popup-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .popup-close:hover {
            background-color: var(--danger);
            color: white;
            transform: rotate(90deg);
        }
        
        .popup-card-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border-color);
            background-color: var(--bg-card);
        }
        
        .popup-card-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        
        .popup-card-suit {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.5rem;
        }
        
        .popup-section {
            margin-bottom: 1.5rem;
        }
        
        .popup-section-title {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .popup-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .popup-keyword-tag {
            background-color: var(--skill-bg);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
        }
        
        .popup-meaning {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 1rem;
        }
        
        .popup-advice {
            background-color: var(--skill-bg);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            color: var(--success);
            font-style: italic;
        }
        
        .popup-reversed {
            background-color: var(--skill-bg);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>

        <a href="index.html" class="header-logo">
            <i class="fas fa-crystal-ball"></i> Таро
        </a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">
            <i class="fas fa-bars"></i>
        </button>
        <nav>
            <ul class="nav-menu" id="navMenu">

            <!-- Избор на тип въпрос -->

    <script src="scripts/cardsdata.js"></script>
    <script src="scripts/main.js"></script>
    <script>
        let drawnCards = [];
        let currentQuestion = 'general';
        const interpreter = new TarotInterpreter();

        // Popup елементи
        const popup = document.getElementById('cardPopup');
        const popupContent = document.getElementById('popupContent');
        const closePopup = document.getElementById('closePopup');

        // Затваряне на popup
        closePopup.addEventListener('click', () => {
            popup.classList.remove('active');
        });

        // Затваряне при клик извън съдържанието
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.classList.remove('active');
            }
        });

        // Затваряне с ESC клавиш
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && popup.classList.contains('active')) {
                popup.classList.remove('active');
            }
        });

        // Тип въпрос
        document.querySelectorAll('[data-question]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-question]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentQuestion = this.dataset.question;
                
                if (drawnCards.length > 0) {
                    updateInterpretation();
                }
            });
        });

        // Теглене на 6 случайни карти
        document.getElementById('drawBtn').addEventListener('click', function() {
            const shuffled = [...tarotCards].sort(() => 0.5 - Math.random());
            drawnCards = shuffled.slice(0, 6);
            
            renderDrawnCards();
            updateInterpretation();
        });

        // Рендериране на изтеглените карти
        function renderDrawnCards() {
            const container = document.getElementById('drawnCards');
            
            container.innerHTML = drawnCards.map(card => {
                const suitClass = card.suit === 'major' ? 'suit-major' : 
                                 card.suit === 'wands' ? 'suit-wands' :
                                 card.suit === 'cups' ? 'suit-cups' :
                                 card.suit === 'swords' ? 'suit-swords' : 'suit-pentacles';
                
                const suitName = card.suit === 'major' ? 'Голям аркан' :
                                card.suit === 'wands' ? 'Жезли' :
                                card.suit === 'cups' ? 'Чаши' :
                                card.suit === 'swords' ? 'Мечове' : 'Пентакли';
                
                return `
                    <div class="card-item" onclick="showCardDetails('${card.id}')">
                        <div class="card-image-container">
                            <img src="${card.image}" alt="${card.cardName}" class="card-image" 
                                 loading="lazy"
                                 onerror="this.src='images/placeholder.jpg';">
                        </div>
                        <div class="card-header">
                            <span class="card-name">${card.cardName}</span>
                            <span class="card-suit ${suitClass}">${suitName}</span>
                        </div>
                        <div class="card-keywords">🔑 ${card.keywords.slice(0, 3).join(' • ')}</div>
                        <div class="card-meaning">${card.meaning.substring(0, 100)}...</div>
                    </div>
                `;
            }).join('');
        }

        // Показване на детайли за карта в popup
        window.showCardDetails = function(cardId) {
            const card = tarotCards.find(c => c.id === cardId);
            if (!card) return;
            
            const suitClass = card.suit === 'major' ? 'suit-major' : 
                             card.suit === 'wands' ? 'suit-wands' :
                             card.suit === 'cups' ? 'suit-cups' :
                             card.suit === 'swords' ? 'suit-swords' : 'suit-pentacles';
            
            const suitName = card.suit === 'major' ? 'Голям аркан' :
                            card.suit === 'wands' ? 'Жезли' :
                            card.suit === 'cups' ? 'Чаши' :
                            card.suit === 'swords' ? 'Мечове' : 'Пентакли';
            
            let html = `
                <img src="${card.image}" alt="${card.cardName}" class="popup-card-image" 
                     onerror="this.src='images/placeholder.jpg';">
                <div class="popup-card-name">${card.cardName}</div>
                <span class="popup-card-suit ${suitClass}">${suitName}</span>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-tags"></i> Ключови думи
                    </div>
                    <div class="popup-keywords">
                        ${card.keywords.map(k => `<span class="popup-keyword-tag">${k}</span>`).join('')}
                    </div>
                </div>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-book-open"></i> Значение
                    </div>
                    <div class="popup-meaning">${card.meaning}</div>
                </div>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-lightbulb"></i> Съвет
                    </div>
                    <div class="popup-advice">${card.advice || 'Няма конкретен съвет за тази карта.'}</div>
                </div>
            `;
            
            if (card.reversed) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-exclamation-triangle"></i> Обърната позиция
                        </div>
                        <div class="popup-reversed">${card.reversed}</div>
                    </div>
                `;
            }
            
            popupContent.innerHTML = html;
            popup.classList.add('active');
        };

        // Актуализиране на тълкуването
        function updateInterpretation() {
            const result = interpreter.interpret(drawnCards, currentQuestion);
            
            let html = '';
            
            // 1. ПЪРВО - специални комбинации (най-отгоре)
            html += '<div class="interpretation-rules">';
            html += '<div class="interpretation-rules-header">';
            html += '<i class="fas fa-star"></i> Специални комбинации';
            html += '</div>';
            
            let hasSpecialCombos = false;
            
            if (result.specialCombinations && result.specialCombinations.length > 0) {
                result.specialCombinations.forEach(combo => {
                    hasSpecialCombos = true;
                    html += `
                        <div class="interpretation-section">
                            <span class="rule-tag">Правило ${combo.ruleId || '?'}</span>
                            <div class="interpretation-title">${combo.type || 'Комбинация'}</div>
                            <div class="interpretation-text">${combo.description || combo}</div>
                            ${combo.advice ? `<div class="rule-advice">💡 Съвет: ${combo.advice}</div>` : ''}
                        </div>
                    `;
                });
            }
            
            // Доминираща стихия
            if (result.elementalTheme) {
                hasSpecialCombos = true;
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">Правило ELEM</span>
                        <div class="interpretation-title">Доминираща стихия</div>
                        <div class="interpretation-text"><strong>${result.elementalTheme.theme}</strong></div>
                        <div class="interpretation-text">${result.elementalTheme.advice}</div>
                    </div>
                `;
            }
            
            // Времева линия за 3+ карти
            if (drawnCards.length >= 3) {
                hasSpecialCombos = true;
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">⏳ Времева линия</span>
                        <div class="interpretation-title">Минало, Настояще, Бъдеще</div>
                        <div class="interpretation-text"><strong>Минало:</strong> ${drawnCards[0].cardName}</div>
                        <div class="interpretation-text"><strong>Настояще:</strong> ${drawnCards[1].cardName}</div>
                        <div class="interpretation-text"><strong>Бъдеще:</strong> ${drawnCards[2].cardName}</div>
                    </div>
                `;
            }
            
            if (!hasSpecialCombos) {
                html += '<div class="interpretation-section">Няма приложени специални правила</div>';
            }
            
            html += '</div>'; // край на interpretation-rules
            
            // 2. ВТОРО - изтеглените карти (отдолу)
            html += '<div class="cards-section">';
            html += '<div class="cards-section-header">';
            html += '<i class="fas fa-crystal-ball"></i> Изтеглени карти';
            html += '</div>';
            
            drawnCards.forEach((card, index) => {
                html += `
                    <div class="interpretation-card-detail" onclick="showCardDetails('${card.id}')">
                        <img src="${card.image}" alt="${card.cardName}" class="interpretation-card-image" 
                             loading="lazy"
                             onerror="this.src='images/placeholder.jpg';">
                        <div class="interpretation-card-info">
                            <div class="interpretation-card-name">${index + 1}. ${card.cardName}</div>
                            <div class="interpretation-card-keywords">
                                <strong>🔑 Ключови думи:</strong> ${card.keywords.join(' • ')}
                            </div>
                            <div class="interpretation-card-meaning">${card.meaning.substring(0, 100)}...</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>'; // край на cards-section
            
            document.getElementById('interpretationContent').innerHTML = html;
            document.getElementById('interpretationPanel').style.display = 'block';
        }

        // Изчистване
        document.getElementById('clearBtn').addEventListener('click', function() {
            drawnCards = [];
            document.getElementById('drawnCards').innerHTML = '';
            document.getElementById('interpretationPanel').style.display = 'none';
        });
    </script>
</body>
</html>
