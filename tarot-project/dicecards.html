<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1D263B">
    <meta name="author" content="comnsnense">
    <meta name="copyright" content="comnsnense 2026">
    <title>🔮 Таро Зарове · Случайни карти</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Стилове за изображения */
        .card-image-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 0.5rem;
        }
        
        .card-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        
        .card-item {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .card-item:hover .card-image {
            transform: scale(1.05);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .card-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .card-suit {
            padding: 0.2rem 0.6rem;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }
        
        .suit-major { background-color: var(--major); }
        .suit-wands { background-color: var(--wands); }
        .suit-cups { background-color: var(--cups); }
        .suit-swords { background-color: var(--swords); }
        .suit-pentacles { background-color: var(--pentacles); }
        
        .card-keywords {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
        }
        
        .card-meaning {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 0.8rem;
        }
        
        /* Стилове за тълкуване */
        .interpretation-card-detail {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            align-items: center;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        
        .interpretation-card-detail:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }
        
        .interpretation-card-image {
            width: 60px;
            height: 90px;
            object-fit: contain;
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .interpretation-card-info {
            flex: 1;
        }
        
        .interpretation-card-name {
            font-weight: 700;
            color: var(--accent);
            font-size: 1rem;
        }
        
        .interpretation-card-keywords {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 0.2rem 0;
        }
        
        .interpretation-card-meaning {
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
        }
        
        /* Ултра детайлни стилове за тълкувания */
        .interpretation-section {
            margin-bottom: 1.2rem;
            padding: 1rem;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            transition: all 0.2s ease;
        }
        
        .interpretation-section:hover {
            background-color: var(--bg-card);
            transform: translateX(3px);
        }
        
        .rule-tag {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }
        
        .interpretation-title {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .interpretation-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        
        .interpretation-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        
        .rule-advice {
            color: var(--success);
            font-size: 0.95rem;
            font-style: italic;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: var(--skill-bg);
            border-radius: 8px;
            border-left: 3px solid var(--success);
        }
        
        .rule-warning {
            color: var(--danger);
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: var(--skill-bg);
            border-radius: 8px;
            border-left: 3px solid var(--danger);
        }
        
        .rule-blessing {
            color: var(--success);
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: var(--skill-bg);
            border-radius: 8px;
            border-left: 3px solid var(--success);
        }
        
        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 0.8rem;
        }
        
        .timeline-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem;
            background-color: var(--bg-card);
            border-radius: 8px;
        }
        
        .timeline-badge {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .timeline-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .timeline-info {
            flex: 1;
        }
        
        .timeline-label {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
        }
        
        .timeline-card {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .elemental-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.3rem;
        }
        
        .element-fire { background-color: var(--wands); color: white; }
        .element-water { background-color: var(--cups); color: white; }
        .element-air { background-color: var(--swords); color: white; }
        .element-earth { background-color: var(--pentacles); color: white; }
        .element-major { background-color: var(--major); color: white; }
        
        /* Бутони */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .action-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .action-btn.draw-btn {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent-hover);
        }
        
        .action-btn.draw-btn:hover {
            background-color: var(--accent-hover);
        }
        
        .action-btn.clear-btn {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .action-btn.clear-btn:hover {
            background-color: #ff6666;
            border-color: #ff6666;
        }
        
        /* Секции */
        .interpretation-rules {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: var(--bg-secondary);
            border-radius: 16px;
            border: 2px solid var(--accent);
        }
        
        .interpretation-rules-header {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
        }
        
        .cards-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--border-color);
        }
        
        .cards-section-header {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Popup прозорец */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            background-color: var(--bg-secondary);
            border: 3px solid var(--accent);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        .popup-overlay.active .popup-content {
            transform: scale(1);
        }
        
        .popup-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .popup-close:hover {
            background-color: var(--danger);
            color: white;
            transform: rotate(90deg);
        }
        
        .popup-card-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border-color);
            background-color: var(--bg-card);
        }
        
        .popup-card-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        
        .popup-card-suit {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.5rem;
        }
        
        .popup-section {
            margin-bottom: 1.5rem;
        }
        
        .popup-section-title {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .popup-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .popup-keyword-tag {
            background-color: var(--skill-bg);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
        }
        
        .popup-meaning {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 1rem;
        }
        
        .popup-advice {
            background-color: var(--skill-bg);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            color: var(--success);
            font-style: italic;
        }
        
        .popup-reversed {
            background-color: var(--skill-bg);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }
        
        /* Мобилни оптимизации */
        @media (max-width: 768px) {
            .interpretation-rules {
                padding: 1rem;
            }
            
            .interpretation-section {
                padding: 0.8rem;
            }
            
            .timeline-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .timeline-badge {
                width: 100%;
                height: 80px;
            }
        }
    </style>
</head>

                </button>

                </button>
            </div>

            <div id="interpretationPanel" style="display: none;">

                </div>

    <script src="scripts/cardsdata.js"></script>
    <script src="scripts/main.js"></script>
    <script>
        let drawnCards = [];
        let currentQuestion = 'general';
        const interpreter = new TarotInterpreter();

        // Поправка: Добавяме липсващите методи в TarotInterpreter
        if (!interpreter.countSuit) {
            interpreter.countSuit = function(cards, suit) {
                return cards.filter(c => c.suit === suit).length;
            };
        }
        
        if (!interpreter.countNumber) {
            interpreter.countNumber = function(cards, number) {
                return cards.filter(c => c.number == number).length;
            };
        }
        
        if (!interpreter.hasCard) {
            interpreter.hasCard = function(cards, cardId) {
                return cards.some(c => c.id === cardId);
            };
        }

        // Popup елементи
        const popup = document.getElementById('cardPopup');
        const popupContent = document.getElementById('popupContent');
        const closePopup = document.getElementById('closePopup');

        // Затваряне на popup
        closePopup.addEventListener('click', () => {
            popup.classList.remove('active');
        });

        // Затваряне при клик извън съдържанието
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.classList.remove('active');
            }
        });

        // Затваряне с ESC клавиш
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && popup.classList.contains('active')) {
                popup.classList.remove('active');
            }
        });

        // Тип въпрос
        document.querySelectorAll('[data-question]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-question]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentQuestion = this.dataset.question;
                
                if (drawnCards.length > 0) {
                    updateInterpretation();
                }
            });
        });

        // Теглене на 6 случайни карти
        document.getElementById('drawBtn').addEventListener('click', function() {
            const shuffled = [...tarotCards].sort(() => 0.5 - Math.random());
            drawnCards = shuffled.slice(0, 6);
            
            renderDrawnCards();
            updateInterpretation();
        });

        // Рендериране на изтеглените карти
        function renderDrawnCards() {
            const container = document.getElementById('drawnCards');
            
            container.innerHTML = drawnCards.map(card => {
                const suitClass = card.suit === 'major' ? 'suit-major' : 
                                 card.suit === 'wands' ? 'suit-wands' :
                                 card.suit === 'cups' ? 'suit-cups' :
                                 card.suit === 'swords' ? 'suit-swords' : 'suit-pentacles';
                
                const suitName = card.suit === 'major' ? 'Голям аркан' :
                                card.suit === 'wands' ? 'Жезли' :
                                card.suit === 'cups' ? 'Чаши' :
                                card.suit === 'swords' ? 'Мечове' : 'Пентакли';
                
                return `
                    <div class="card-item" onclick="showCardDetails('${card.id}')">
                        <div class="card-image-container">
                            <img src="${card.image}" alt="${card.cardName}" class="card-image" 
                                 loading="lazy"
                                 onerror="this.src='images/placeholder.jpg';">
                        </div>
                        <div class="card-header">
                            <span class="card-name">${card.cardName}</span>
                            <span class="card-suit ${suitClass}">${suitName}</span>
                        </div>
                        <div class="card-keywords">🔑 ${card.keywords.slice(0, 3).join(' • ')}</div>
                        <div class="card-meaning">${card.meaning.substring(0, 100)}...</div>
                    </div>
                `;
            }).join('');
        }

        // Показване на детайли за карта в popup
        window.showCardDetails = function(cardId) {
            const card = tarotCards.find(c => c.id === cardId);
            if (!card) return;
            
            const suitClass = card.suit === 'major' ? 'suit-major' : 
                             card.suit === 'wands' ? 'suit-wands' :
                             card.suit === 'cups' ? 'suit-cups' :
                             card.suit === 'swords' ? 'suit-swords' : 'suit-pentacles';
            
            const suitName = card.suit === 'major' ? 'Голям аркан' :
                            card.suit === 'wands' ? 'Жезли' :
                            card.suit === 'cups' ? 'Чаши' :
                            card.suit === 'swords' ? 'Мечове' : 'Пентакли';
            
            let html = `
                <img src="${card.image}" alt="${card.cardName}" class="popup-card-image" 
                     onerror="this.src='images/placeholder.jpg';">
                <div class="popup-card-name">${card.cardName}</div>
                <span class="popup-card-suit ${suitClass}">${suitName}</span>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-tags"></i> Ключови думи
                    </div>
                    <div class="popup-keywords">
                        ${card.keywords.map(k => `<span class="popup-keyword-tag">${k}</span>`).join('')}
                    </div>
                </div>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-book-open"></i> Пълно значение
                    </div>
                    <div class="popup-meaning">${card.meaning}</div>
                </div>
            `;
            
            if (card.asSituation) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-clock"></i> Като ситуация
                        </div>
                        <div class="popup-meaning">${card.asSituation}</div>
                    </div>
                `;
            }
            
            if (card.asPerson) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-user"></i> Като човек
                        </div>
                        <div class="popup-meaning">${card.asPerson}</div>
                    </div>
                `;
            }
            
            if (card.advice) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-lightbulb"></i> Съвет
                        </div>
                        <div class="popup-advice">${card.advice}</div>
                    </div>
                `;
            }
            
            if (card.reversed) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-exclamation-triangle"></i> Обърната позиция
                        </div>
                        <div class="popup-reversed">${card.reversed}</div>
                    </div>
                `;
            }
            
            popupContent.innerHTML = html;
            popup.classList.add('active');
        };

        // Функция за получаване на цветен етикет за стихия
        function getElementBadge(element) {
            const elementMap = {
                'Огън': 'element-fire',
                'Вода': 'element-water',
                'Въздух': 'element-air',
                'Земя': 'element-earth',
                'major': 'element-major'
            };
            return elementMap[element] || '';
        }

        // Актуализиране на тълкуването
        function updateInterpretation() {
            const result = interpreter.interpret(drawnCards, currentQuestion);
            
            let html = '';
            
            // 1. ПЪРВО - специални комбинации (най-отгоре)
            html += '<div class="interpretation-rules">';
            html += '<div class="interpretation-rules-header">';
            html += '<i class="fas fa-star"></i> Специални комбинации и взаимодействия';
            html += '</div>';
            
            let hasSpecialCombos = false;
            
            // Брой по бои за статистика
            const suitCounts = {
                wands: drawnCards.filter(c => c.suit === 'wands').length,
                cups: drawnCards.filter(c => c.suit === 'cups').length,
                swords: drawnCards.filter(c => c.suit === 'swords').length,
                pentacles: drawnCards.filter(c => c.suit === 'pentacles').length,
                major: drawnCards.filter(c => c.suit === 'major').length
            };
            
            // Статистика за боите
            if (suitCounts.major > 0) {
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">📊 Статистика</span>
                        <div class="interpretation-title">Разпределение по бои</div>
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                            ${suitCounts.wands > 0 ? `<span class="elemental-badge element-fire">Жезли: ${suitCounts.wands}</span>` : ''}
                            ${suitCounts.cups > 0 ? `<span class="elemental-badge element-water">Чаши: ${suitCounts.cups}</span>` : ''}
                            ${suitCounts.swords > 0 ? `<span class="elemental-badge element-air">Мечове: ${suitCounts.swords}</span>` : ''}
                            ${suitCounts.pentacles > 0 ? `<span class="elemental-badge element-earth">Пентакли: ${suitCounts.pentacles}</span>` : ''}
                            ${suitCounts.major > 0 ? `<span class="elemental-badge element-major">Големи аркани: ${suitCounts.major}</span>` : ''}
                        </div>
                    </div>
                `;
                hasSpecialCombos = true;
            }
            
            // Специални комбинации от интерпретатора
            if (result.specialCombinations && result.specialCombinations.length > 0) {
                result.specialCombinations.forEach(combo => {
                    hasSpecialCombos = true;
                    
                    // Определяне дали е предупреждение или благословия
                    const isWarning = combo.warning || (combo.type && combo.type.includes('ПРЕДУПРЕЖДЕНИЕ'));
                    const isBlessing = combo.blessing || (combo.type && combo.type.includes('БЛАГОСЛОВИЯ'));
                    
                    html += `
                        <div class="interpretation-section">
                            <span class="rule-tag">Правило ${combo.ruleId || '?'}</span>
                            <div class="interpretation-title">${combo.type || 'Специална комбинация'}</div>
                            <div class="interpretation-text">${combo.description || combo}</div>
                            ${combo.advice ? `<div class="rule-advice">💡 ${combo.advice}</div>` : ''}
                            ${isWarning ? `<div class="rule-warning">⚠️ ВНИМАНИЕ: Тази комбинация носи предупреждение!</div>` : ''}
                            ${isBlessing ? `<div class="rule-blessing">✨ БЛАГОСЛОВИЯ: Тази комбинация носи щастие!</div>` : ''}
                        </div>
                    `;
                });
            }
            
            // Доминираща стихия
            if (result.elementalTheme) {
                hasSpecialCombos = true;
                const elementClass = result.elementalTheme.theme.includes('ОГЪН') ? 'element-fire' :
                                    result.elementalTheme.theme.includes('ВОДА') ? 'element-water' :
                                    result.elementalTheme.theme.includes('ВЪЗДУХ') ? 'element-air' :
                                    result.elementalTheme.theme.includes('ЗЕМЯ') ? 'element-earth' : '';
                
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">🌍 Доминираща стихия</span>
                        <div class="interpretation-title">
                            <span class="elemental-badge ${elementClass}" style="margin-right: 0.5rem;">⬤</span>
                            ${result.elementalTheme.theme}
                        </div>
                        <div class="interpretation-text">${result.elementalTheme.advice}</div>
                    </div>
                `;
            }
            
            // Анализ на числата
            const numberCounts = {};
            drawnCards.forEach(card => {
                const num = card.number;
                numberCounts[num] = (numberCounts[num] || 0) + 1;
            });
            
            const repeatedNumbers = Object.entries(numberCounts).filter(([num, count]) => count > 1);
            if (repeatedNumbers.length > 0) {
                hasSpecialCombos = true;
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">🔢 Повтарящи се числа</span>
                        <div class="interpretation-title">Числови модели</div>
                        <div class="interpretation-text">
                            ${repeatedNumbers.map(([num, count]) => {
                                const numberMeanings = {
                                    '1': 'Ново начало',
                                    '2': 'Баланс и избор',
                                    '3': 'Растеж',
                                    '4': 'Стабилност',
                                    '5': 'Конфликт',
                                    '6': 'Хармония',
                                    '7': 'Изпитание',
                                    '8': 'Движение',
                                    '9': 'Завършване',
                                    '10': 'Край на цикъл',
                                    '11': 'Младост',
                                    '12': 'Действие',
                                    '13': 'Вътрешна зрялост',
                                    '14': 'Лидерство'
                                };
                                return `<strong>Число ${num}</strong> се появява ${count} пъти – ${numberMeanings[num] || 'Силна енергия'}`;
                            }).join('<br>')}
                        </div>
                    </div>
                `;
            }
            
            // Времева линия за 3+ карти
            if (drawnCards.length >= 3) {
                hasSpecialCombos = true;
                html += `
                    <div class="interpretation-section">
                        <span class="rule-tag">⏳ Времева линия</span>
                        <div class="interpretation-title">Минало, Настояще, Бъдеще</div>
                        <div class="timeline-container">
                            <div class="timeline-item">
                                <div class="timeline-badge">
                                    <img src="${drawnCards[0].image}" alt="${drawnCards[0].cardName}" onerror="this.src='images/placeholder.jpg';">
                                </div>
                                <div class="timeline-info">
                                    <div class="timeline-label">МИНАЛО (основа)</div>
                                    <div class="timeline-card">${drawnCards[0].cardName}</div>
                                    <div class="interpretation-text" style="font-size: 0.8rem;">${drawnCards[0].meaning.substring(0, 60)}...</div>
                                </div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-badge">
                                    <img src="${drawnCards[1].image}" alt="${drawnCards[1].cardName}" onerror="this.src='images/placeholder.jpg';">
                                </div>
                                <div class="timeline-info">
                                    <div class="timeline-label">НАСТОЯЩЕ (предизвикателство)</div>
                                    <div class="timeline-card">${drawnCards[1].cardName}</div>
                                    <div class="interpretation-text" style="font-size: 0.8rem;">${drawnCards[1].meaning.substring(0, 60)}...</div>
                                </div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-badge">
                                    <img src="${drawnCards[2].image}" alt="${drawnCards[2].cardName}" onerror="this.src='images/placeholder.jpg';">
                                </div>
                                <div class="timeline-info">
                                    <div class="timeline-label">БЪДЕЩЕ (резултат)</div>
                                    <div class="timeline-card">${drawnCards[2].cardName}</div>
                                    <div class="interpretation-text" style="font-size: 0.8rem;">${drawnCards[2].meaning.substring(0, 60)}...</div>
                                </div>
                            </div>
                        </div>
                        <div class="interpretation-text" style="margin-top: 1rem;">
                            <strong>Обобщение:</strong> ${drawnCards[0].cardName} в миналото води до ${drawnCards[1].cardName} в настоящето, което ще доведе до ${drawnCards[2].cardName} в бъдещето.
                        </div>
                    </div>
                `;
            }
            
            if (!hasSpecialCombos) {
                html += '<div class="interpretation-section">Няма приложени специални правила. Това е самостоятелно разчитане на отделните карти.</div>';
            }
            
            html += '</div>'; // край на interpretation-rules
            
            // 2. ВТОРО - изтеглените карти (отдолу)
            html += '<div class="cards-section">';
            html += '<div class="cards-section-header">';
            html += '<i class="fas fa-crystal-ball"></i> Изтеглени карти (кликни за детайли)';
            html += '</div>';
            
            drawnCards.forEach((card, index) => {
                html += `
                    <div class="interpretation-card-detail" onclick="showCardDetails('${card.id}')">
                        <img src="${card.image}" alt="${card.cardName}" class="interpretation-card-image" 
                             loading="lazy"
                             onerror="this.src='images/placeholder.jpg';">
                        <div class="interpretation-card-info">
                            <div class="interpretation-card-name">${index + 1}. ${card.cardName}</div>
                            <div class="interpretation-card-keywords">
                                <strong>🔑 Ключови думи:</strong> ${card.keywords.join(' • ')}
                            </div>
                            <div class="interpretation-card-meaning">${card.meaning.substring(0, 100)}...</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>'; // край на cards-section
            
            document.getElementById('interpretationContent').innerHTML = html;
            document.getElementById('interpretationPanel').style.display = 'block';
        }

        // Изчистване
        document.getElementById('clearBtn').addEventListener('click', function() {
            drawnCards = [];
            document.getElementById('drawnCards').innerHTML = '';
            document.getElementById('interpretationPanel').style.display = 'none';
        });
    </script>
</body>
</html>
