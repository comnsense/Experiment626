    <style>
        /* Оптимизирани стилове за изображения */
        .card-image-container {
            width: 100%;
            aspect-ratio: 2 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-card-solid));
            border-radius: 16px;
            margin-bottom: 0.8rem;
            border: 2px solid var(--glass-border);
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 0.3rem;
            transition: all 0.3s ease;
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 12px;
            transition: transform 0.3s ease, filter 0.3s ease;
            background-color: var(--bg-card);
            will-change: transform;
        }
        
        .card-image[loading="lazy"] {
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMxQTI2M0IiLz48L3N2Zz4=');
            background-size: cover;
        }
        
        .card-item {
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-card-solid);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        
        .card-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-glow);
            border-color: var(--accent);
        }
        
        .card-item:hover .card-image {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        
        .card-item .card-name {
            font-size: 1.1rem;
            text-align: center;
            margin-top: 0.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-item .card-english-name {
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            font-style: italic;
            opacity: 0.8;
        }
        
        .card-item .card-keywords-preview {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0.3rem;
            padding: 0.2rem 0.5rem;
            background: var(--skill-bg);
            border-radius: 20px;
            display: inline-block;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid var(--glass-border);
        }
        
        /* Popup стилове */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            background: var(--bg-card-solid);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(30px);
        }
        
        .popup-overlay.active .popup-content {
            transform: scale(1);
        }
        
        .popup-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        .popup-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
            border-color: var(--danger);
        }
        
        .popup-card-image-container {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-card);
            border: 2px solid var(--glass-border);
        }
        
        .popup-card-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .popup-card-name {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .popup-card-suit {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .popup-section {
            margin-bottom: 1.5rem;
        }
        
        .popup-section-title {
            font-size: 1.1rem;
            color: var(--accent-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .popup-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .popup-keyword-tag {
            background: var(--skill-bg);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }
        
        .popup-meaning {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .popup-advice {
            background: var(--skill-bg);
            padding: 1rem;
            border-radius: 16px;
            border-left: 4px solid var(--success);
            color: var(--success);
            font-style: italic;
        }
        
        .popup-reversed {
            background: var(--skill-bg);
            padding: 1rem;
            border-radius: 16px;
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }
        
        /* Филтри за придворни карти */
        .court-filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        
        /* Мобилни оптимизации */
        @media (max-width: 768px) {
            .card-image-container {
                aspect-ratio: 2 / 3;
            }
            
            .popup-content {
                padding: 1.5rem;
            }
            
            .popup-card-name {
                font-size: 1.5rem;
            }
            
            .card-item .card-keywords-preview {
                font-size: 0.7rem;
            }
            
            .card-item .card-english-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

    <script src="scripts/cardsdata.js"></script>
    <script src="scripts/main.js"></script>
    <script>
        let currentFilter = 'all';
        let currentNumber = null;
        let currentCourt = null;

        // Popup елементи
        const popup = document.getElementById('cardPopup');
        const popupContent = document.getElementById('popupContent');
        const closePopup = document.getElementById('closePopup');

        // Затваряне на popup
        closePopup.addEventListener('click', () => {
            popup.classList.remove('active');
        });

        // Затваряне при клик извън съдържанието
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.classList.remove('active');
            }
        });

        // Затваряне с ESC клавиш
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && popup.classList.contains('active')) {
                popup.classList.remove('active');
            }
        });

        // Генериране на бутони за числа 1-14 (само 1-10)
        function generateNumberButtons() {
            const container = document.getElementById('numberButtons');
            
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.setAttribute('data-number', i);
                btn.textContent = i;
                btn.onclick = () => filterByNumber(i);
                container.appendChild(btn);
            }
        }

        // Филтриране по боя
        function filterCards(filter) {
            currentFilter = filter;
            currentNumber = null;
            currentCourt = null;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.court-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            applyFilters();
        }

        // Филтриране по число
        function filterByNumber(number) {
            currentNumber = number;
            currentFilter = null;
            currentCourt = null;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.number == number);
            });
            document.querySelectorAll('.court-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            applyFilters();
        }

        // Филтриране по придворна карта
        function filterByCourt(court) {
            currentCourt = court;
            currentFilter = null;
            currentNumber = null;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.court-filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.court === court);
            });
            
            applyFilters();
        }

        // Прилагане на филтрите
        function applyFilters() {
            let filtered = tarotCards;
            
            // Филтър по боя
            if (currentFilter && currentFilter !== 'all') {
                filtered = filtered.filter(c => c.suit === currentFilter);
            }
            
            // Филтър по число (1-10)
            if (currentNumber) {
                filtered = filtered.filter(c => {
                    const numMap = {
                        "0": 0, "I": 1, "II": 2, "III": 3, "IV": 4, "V": 5, "VI": 6, "VII": 7, 
                        "VIII": 8, "IX": 9, "X": 10
                    };
                    
                    const cardNum = numMap[c.number] || parseInt(c.number) || 0;
                    return cardNum === currentNumber;
                });
            }
            
            // Филтър по придворна карта
            if (currentCourt) {
                filtered = filtered.filter(c => {
                    // Проверка по името на картата
                    const cardName = c.cardName || c.name || '';
                    
                    if (currentCourt === 'page') {
                        return cardName.includes('Паж') || cardName.includes('Page');
                    } else if (currentCourt === 'knight') {
                        return cardName.includes('Рицар') || cardName.includes('Knight');
                    } else if (currentCourt === 'queen') {
                        return cardName.includes('Царица') || cardName.includes('Queen');
                    } else if (currentCourt === 'king') {
                        return cardName.includes('Цар') || cardName.includes('King');
                    }
                    return false;
                });
            }
            
            renderCards(filtered);
        }

        // Показване на детайли за карта в popup
        function showCardDetails(cardId) {
            const card = tarotCards.find(c => c.id === cardId);
            if (!card) return;
            
            const suitClass = card.suit === 'major' ? 'suit-major' : 
                             card.suit === 'wands' ? 'suit-wands' :
                             card.suit === 'cups' ? 'suit-cups' :
                             card.suit === 'swords' ? 'suit-swords' : 'suit-pentacles';
            
            const suitName = card.suit === 'major' ? 'Голям аркан' :
                            card.suit === 'wands' ? 'Жезли' :
                            card.suit === 'cups' ? 'Чаши' :
                            card.suit === 'swords' ? 'Мечове' : 'Пентакли';
            
            let html = `
                <div class="popup-card-image-container">
                    <img src="${card.image}" alt="${card.cardName}" class="popup-card-image" 
                         onerror="this.src='images/placeholder.jpg';">
                </div>
                <div class="popup-card-name">${card.cardName}</div>
                <span class="popup-card-suit ${suitClass}">${suitName}</span>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-tags"></i> Ключови думи
                    </div>
                    <div class="popup-keywords">
                        ${card.keywords.map(k => `<span class="popup-keyword-tag">${k}</span>`).join('')}
                    </div>
                </div>
                
                <div class="popup-section">
                    <div class="popup-section-title">
                        <i class="fas fa-book-open"></i> Пълно значение
                    </div>
                    <div class="popup-meaning">${card.meaning}</div>
                </div>
            `;
            
            if (card.asSituation) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-clock"></i> Като ситуация
                        </div>
                        <div class="popup-meaning">${card.asSituation}</div>
                    </div>
                `;
            }
            
            if (card.asPerson) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-user"></i> Като човек
                        </div>
                        <div class="popup-meaning">${card.asPerson}</div>
                    </div>
                `;
            }
            
            if (card.advice) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-lightbulb"></i> Съвет
                        </div>
                        <div class="popup-advice">${card.advice}</div>
                    </div>
                `;
            }
            
            if (card.reversed) {
                html += `
                    <div class="popup-section">
                        <div class="popup-section-title">
                            <i class="fas fa-exclamation-triangle"></i> Обърната позиция
                        </div>
                        <div class="popup-reversed">${card.reversed}</div>
                    </div>
                `;
            }
            
            popupContent.innerHTML = html;
            popup.classList.add('active');
        }

        // Помощна функция за извличане на английско име от cardName
        function getEnglishName(cardName) {
            // Големи аркани
            const majorMap = {
                'Глупакът': 'The Fool',
                'Магьосникът': 'The Magician',
                'Върховната жрица': 'The High Priestess',
                'Императрицата': 'The Empress',
                'Императорът': 'The Emperor',
                'Йерофантът': 'The Hierophant',
                'Влюбените': 'The Lovers',
                'Колесницата': 'The Chariot',
                'Силата': 'Strength',
                'Отшелникът': 'The Hermit',
                'Колелото на съдбата': 'Wheel of Fortune',
                'Справедливост': 'Justice',
                'Обесеният': 'The Hanged Man',
                'Смърт': 'Death',
                'Умереност': 'Temperance',
                'Дяволът': 'The Devil',
                'Кулата': 'The Tower',
                'Звездата': 'The Star',
                'Луната': 'The Moon',
                'Слънцето': 'The Sun',
                'Съд': 'Judgement',
                'Светът': 'The World'
            };
            
            // Малки аркани - стандартни имена
            if (cardName.includes('Асо')) {
                return cardName.replace('Асо', 'Ace');
            } else if (cardName.includes('Двойка')) {
                return cardName.replace('Двойка', 'Two');
            } else if (cardName.includes('Тройка')) {
                return cardName.replace('Тройка', 'Three');
            } else if (cardName.includes('Четворка')) {
                return cardName.replace('Четворка', 'Four');
            } else if (cardName.includes('Петица')) {
                return cardName.replace('Петица', 'Five');
            } else if (cardName.includes('Шестица')) {
                return cardName.replace('Шестица', 'Six');
            } else if (cardName.includes('Седмица')) {
                return cardName.replace('Седмица', 'Seven');
            } else if (cardName.includes('Осмица')) {
                return cardName.replace('Осмица', 'Eight');
            } else if (cardName.includes('Деветка')) {
                return cardName.replace('Деветка', 'Nine');
            } else if (cardName.includes('Десетка')) {
                return cardName.replace('Десетка', 'Ten');
            } else if (cardName.includes('Паж')) {
                return cardName.replace('Паж', 'Page');
            } else if (cardName.includes('Рицар')) {
                return cardName.replace('Рицар', 'Knight');
            } else if (cardName.includes('Царица')) {
                return cardName.replace('Царица', 'Queen');
            } else if (cardName.includes('Цар')) {
                return cardName.replace('Цар', 'King');
            }
            
            return majorMap[cardName] || cardName;
        }

        // Рендериране на карти с изображения и ключови думи
        function renderCards(cards) {
            const grid = document.getElementById('cardsGrid');
            if (cards.length === 0) {
                grid.innerHTML = '<div class="no-results">🔮 Няма намерени карти</div>';
                return;
            }
            
            grid.innerHTML = cards.map(card => {
                // Вземаме първите 3 ключови думи за преглед
                const keywordsPreview = card.keywords.slice(0, 3).join(' • ');
                const englishName = getEnglishName(card.cardName);
                
                return `
                    <div class="card-item" onclick="showCardDetails('${card.id}')">
                        <div class="card-image-container">
                            <img src="${card.image}" alt="${card.cardName}" class="card-image" 
                                 loading="lazy"
                                 onerror="this.src='images/placeholder.jpg';">
                        </div>
                        <div class="card-name">${card.cardName}</div>
                        <div class="card-english-name">${englishName}</div>
                        <div class="card-keywords-preview" title="${card.keywords.join(' • ')}">
                            🔑 ${keywordsPreview}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Закачане на филтрите за придворни карти
        document.querySelectorAll('.court-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => filterByCourt(btn.dataset.court));
        });

        // Закачане на филтрите по боя
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => filterCards(btn.dataset.filter));
        });

        // Инициализация
        generateNumberButtons();
        filterCards('all');
    </script>
</body>
</html>
