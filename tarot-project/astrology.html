            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

        // ==================== ГЛОБАЛНИ ПРОМЕНЛИВИ ====================
        let allCards = [];
        let currentFilter = 'all';
        let expandedCardId = null;
        let visibleAstrologyCardId = null;

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function initializeCards() {
            // Добавяне на големите аркани
            for (let key in tarotData.major) {
                allCards.push(tarotData.major[key]);
            }
            
            // Добавяне на малките аркани
            allCards = allCards.concat(tarotData.minor);
            
            // Сортиране по ID
            allCards.sort((a, b) => a.id - b.id);
        }

        // ==================== РЕНДЕР НА КАРТИ ====================
        function renderCards(filteredCards) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            if (filteredCards.length === 0) {
                grid.innerHTML = '<div class="no-results">🔮 Няма намерени карти по зададения критерий</div>';
                return;
            }
            
            filteredCards.forEach(card => {
                const cardElement = createCardElement(card);
                grid.appendChild(cardElement);
            });
            
            updateStats(filteredCards);
        }

        // ==================== СЪЗДАВАНЕ НА КАРТА HTML ====================
        function createCardElement(card) {
            const div = document.createElement('div');
            div.className = `card-item ${expandedCardId === card.id ? 'expanded' : ''}`;
            
            // Определяне на клас за боята
            let suitClass = '';
            if (card.suit === 'major') suitClass = 'suit-major';
            else if (card.suit === 'wands') suitClass = 'suit-wands';
            else if (card.suit === 'cups') suitClass = 'suit-cups';
            else if (card.suit === 'swords') suitClass = 'suit-swords';
            else if (card.suit === 'pentacles') suitClass = 'suit-pentacles';
            
            // Определяне на името на боята
            let suitDisplay = card.suitName || '';
            if (card.suit === 'major') suitDisplay = 'Голям аркан';
            
            // Генериране на HTML
            let html = `
                <div class="card-header">
                    <div>
                        <span class="card-name">${card.name}</span>
                        ${card.nick ? `<span class="card-nick"> - ${card.nick}</span>` : ''}
                    </div>
                    <span class="card-suit ${suitClass}">${suitDisplay}</span>
                </div>
                <div class="card-element">✨ Стихия: ${card.element || 'Смесена'}</div>
                <div class="card-keywords">🔑 ${card.keywords?.light?.join(' • ') || ''}</div>
                <div class="card-meaning">${card.meanings?.general?.substring(0, 150)}${card.meanings?.general?.length > 150 ? '...' : ''}</div>
            `;
            
            // Ако картата е разширена, показваме повече детайли
            if (expandedCardId === card.id) {
                html += `
                    <div class="card-timing">⏰ Време: ${card.timing || 'Неопределено'}</div>
                    <div class="card-advice">💡 Съвет: ${card.advice || 'Няма съвет'}</div>
                    <div class="card-reversed">⚠️ Обърната: ${card.reversed || 'Няма информация'}</div>
                `;
                
                // Добавяне на бутон за астрология (само ако има астрологични данни)
                if (card.astrology) {
                    const isVisible = visibleAstrologyCardId === card.id;
                    html += `
                        <button class="astrology-toggle ${isVisible ? 'active' : ''}" onclick="event.stopPropagation(); toggleAstrology(${card.id})">
                            ⚡ ${isVisible ? 'Скрий астрология' : 'Покажи астрология'}
                        </button>
                        <div class="astrology-section ${isVisible ? 'visible' : ''}" id="astro-${card.id}">
                            <div class="astrology-title">⭐ АСТРОЛОГИЧЕСКИ ДАННИ</div>
                            <div class="astrology-grid">
                                <div class="astrology-item">
                                    <div class="astrology-label">Планета</div>
                                    <div class="astrology-value">${card.astrology.planet || '—'}</div>
                                </div>
                                <div class="astrology-item">
                                    <div class="astrology-label">Зодия</div>
                                    <div class="astrology-value">${card.astrology.zodiac || '—'}</div>
                                </div>
                                <div class="astrology-item">
                                    <div class="astrology-label">Декан</div>
                                    <div class="astrology-value">${card.astrology.decan || '—'}</div>
                                </div>
                                <div class="astrology-item">
                                    <div class="astrology-label">Стихия</div>
                                    <div class="astrology-value">${card.astrology.element || card.element || '—'}</div>
                                </div>
                                ${card.astrology.ruler ? `
                                <div class="astrology-item">
                                    <div class="astrology-label">Управител</div>
                                    <div class="astrology-value">${card.astrology.ruler}</div>
                                </div>
                                ` : ''}
                            </div>
                            ${card.astrology.note ? `<div class="astrology-note">📝 ${card.astrology.note}</div>` : ''}
                        </div>
                    `;
                }
            }
            
            div.innerHTML = html;
            
            // Клик върху картата за разширяване/свиване
            div.addEventListener('click', (e) => {
                // Предотвратяване на затваряне при клик върху бутона
                if (e.target.classList.contains('astrology-toggle')) return;
                
                if (expandedCardId === card.id) {
                    expandedCardId = null;
                    visibleAstrologyCardId = null; // Скриваме и астрологията при свиване
                } else {
                    expandedCardId = card.id;
                }
                filterCards(currentFilter);
            });
            
            return div;
        }

        // ==================== ФУНКЦИЯ ЗА ТОГЪЛ НА АСТРОЛОГИЯТА ====================
        function toggleAstrology(cardId) {
            if (visibleAstrologyCardId === cardId) {
                visibleAstrologyCardId = null; // Скриваме
            } else {
                visibleAstrologyCardId = cardId; // Показваме
            }
            // Пререндерираме с текущия филтър, за да запазим състоянието
            filterCards(currentFilter);
        }

        // ==================== ФИЛТРИРАНЕ НА КАРТИ ====================
        function filterCards(filter) {
            currentFilter = filter;
            
            // Актуализиране на активния бутон
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event?.target.classList.add('active');
            
            let filtered = [];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (filter === 'all') {
                filtered = allCards;
            } else if (filter === 'major') {
                filtered = allCards.filter(card => card.suit === 'major');
            } else {
                filtered = allCards.filter(card => card.suit === filter);
            }
            
            // Прилагане на търсене
            if (searchTerm) {
                filtered = filtered.filter(card => 
                    card.name.toLowerCase().includes(searchTerm) ||
                    (card.nick && card.nick.toLowerCase().includes(searchTerm)) ||
                    (card.keywords?.light && card.keywords.light.some(k => k.toLowerCase().includes(searchTerm))) ||
                    (card.meanings?.general && card.meanings.general.toLowerCase().includes(searchTerm))
                );
            }
            
            renderCards(filtered);
        }

        // ==================== АКТУАЛИЗИРАНЕ НА СТАТИСТИКАТА ====================
        function updateStats(filteredCards) {
            const statsSection = document.getElementById('statsSection');
            const totalCards = allCards.length;
            const filteredCount = filteredCards.length;
            const majorCount = allCards.filter(c => c.suit === 'major').length;
            const minorCount = totalCards - majorCount;
            
            statsSection.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${filteredCount}</div>
                    <div class="stat-label">Показани карти</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${majorCount}</div>
                    <div class="stat-label">Големи аркани</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${minorCount}</div>
                    <div class="stat-label">Малки аркани</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${new Date().toLocaleDateString('bg-BG')}</div>
                    <div class="stat-label">Дата</div>
                </div>
            `;
        }

        // ==================== ТЪРСЕНЕ ====================
        document.getElementById('searchInput').addEventListener('input', () => {
            filterCards(currentFilter);
        });

        // ==================== СТАРТ ====================
        initializeCards();
        filterCards('all');

        // Изнасяме функциите в глобалния обхват
        window.filterCards = filterCards;
        window.toggleAstrology = toggleAstrology;
    </script>
