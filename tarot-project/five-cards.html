<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1D263B">
    <meta name="author" content="comnsnense">
    <meta name="copyright" content="comnsnense 2026">
    <title>🔮 Тегли карти · Таро · comnsnense</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .drawn-card {
            display: flex;
            gap: 1.5rem;
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }
        
        .drawn-card:hover {
            transform: translateX(10px);
            border-color: var(--accent);
        }
        
        .drawn-card-image {
            flex: 0 0 120px;
        }
        
        .drawn-card-image img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        
        .drawn-card-content {
            flex: 1;
        }
        
        .drawn-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        
        .drawn-card-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .drawn-card-keyword {
            background-color: var(--skill-bg);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        
        .drawn-card-meaning {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .drawn-card {
                flex-direction: column;
                gap: 1rem;
            }
            
            .drawn-card-image {
                flex: 0 0 auto;
                max-width: 150px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="header-logo">
            <i class="fas fa-crystal-ball"></i> Таро
        </a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">
            <i class="fas fa-bars"></i>
        </button>
        <nav>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html"><i class="fas fa-layer-group"></i> Всички карти</a></li>
                <li class="nav-item"><a href="five-cards.html" class="active"><i class="fas fa-hand"></i> Тегли</a></li>
                <li class="nav-item"><a href="select-cards.html"><i class="fas fa-check-double"></i> Избери</a></li>
                <li class="theme-switch-wrapper">
                    <span class="theme-icon"><i class="fas fa-sun"></i></span>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="theme-icon"><i class="fas fa-moon"></i></span>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="info-card">
            <div class="card-title">
                <i class="fas fa-hand"></i> Тегли карти
                <span id="statsDisplay" style="background-color: var(--skill-bg); padding: 0.3rem 1rem; border-radius: 20px; font-size: 1rem;">
                    <i class="fas fa-crystal-ball"></i> 5 карти
                </span>
            </div>
            
            <div class="draw-controls">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center;">
                    <label for="cardCount" style="font-weight: 600;">Брой карти:</label>
                    <select id="cardCount" style="padding: 0.5rem 1rem; border-radius: 30px; background-color: var(--bg-secondary); color: var(--text-primary); border: 2px solid var(--border-color);">
                        <option value="1">1 карта</option>
                        <option value="2">2 карти</option>
                        <option value="3">3 карти</option>
                        <option value="4">4 карти</option>
                        <option value="5" selected>5 карти</option>
                    </select>
                    <button class="btn" id="drawBtn"><i class="fas fa-crystal-ball"></i> Тегли</button>
                    <button class="btn" id="clearBtn"><i class="fas fa-eraser"></i> Изчисти</button>
                </div>
            </div>

            <div id="drawnCardsContainer"></div>

            <div class="interpretation-panel" id="interpretationPanel">
                <div class="interpretation-header">
                    <i class="fas fa-scroll"></i> Тълкувание
                </div>
                <div id="interpretationContent" style="color: var(--text-secondary); line-height: 1.6;">
                    Изтегли карти, за да видиш тълкувание.
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p><i class="fas fa-copyright"></i> 2026 · comnsnense · Всички права запазени</p>
        <div class="footer-column">
            <ul class="social-links">
                <li class="social-link"><a href="mailto:comnsense17@gmail.com"><i class="fas fa-envelope"></i></a></li>
                <li class="social-link"><a href="https://t.me/comnsense88"><i class="fab fa-telegram-plane"></i></a></li>
                <li class="social-link"><a href="https://cv-mirela.netlify.app/"><i class="fas fa-globe"></i></a></li>
                <li class="social-link"><a href="https://www.linkedin.com/in/comnsense"><i class="fab fa-linkedin-in"></i></a></li>
            </ul>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                htmlElement.setAttribute('data-theme', 'light');
                themeToggle.checked = true;
            }
            
            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    htmlElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                }
            });

            // Mobile menu
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navMenu = document.getElementById('navMenu');
            mobileMenuBtn.addEventListener('click', function() {
                navMenu.classList.toggle('show');
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });

            // Помощни функции за изображения
            function getEnglishRank(number) {
                const ranks = {
                    1: 'ace', 2: 'two', 3: 'three', 4: 'four', 5: 'five',
                    6: 'six', 7: 'seven', 8: 'eight', 9: 'nine', 10: 'ten',
                    11: 'page', 12: 'knight', 13: 'queen', 14: 'king'
                };
                return ranks[number] || 'card';
            }

            function getEnglishName(bgName) {
                const names = {
                    'Глупакът': 'fool',
                    'Магьосникът': 'magician',
                    'Върховната жрица': 'high-priestess',
                    'Императрицата': 'empress',
                    'Императорът': 'emperor',
                    'Йерофантът': 'hierophant',
                    'Влюбените': 'lovers',
                    'Колесницата': 'chariot',
                    'Силата': 'strength',
                    'Отшелникът': 'hermit',
                    'Колелото на съдбата': 'wheel-of-fortune',
                    'Справедливост': 'justice',
                    'Обесеният': 'hanged-man',
                    'Смърт': 'death',
                    'Умереност': 'temperance',
                    'Дяволът': 'devil',
                    'Кулата': 'tower',
                    'Звездата': 'star',
                    'Луната': 'moon',
                    'Слънцето': 'sun',
                    'Съд': 'judgement',
                    'Светът': 'world'
                };
                return names[bgName] || bgName.toLowerCase().replace(/[^a-z0-9]/g, '-');
            }

            function getCardImagePath(card) {
                if (!card) return 'images/placeholder.jpg';
                
                if (card.type === 'major') {
                    const num = card.number.toString().padStart(2, '0');
                    const nameEn = getEnglishName(card.name);
                    return `images/major-${num}-${nameEn}.jpg`;
                } else {
                    const num = card.number.toString().padStart(2, '0');
                    const rankEn = getEnglishRank(card.number);
                    return `images/${card.suit}-${num}-${rankEn}.jpg`;
                }
            }

            const drawBtn = document.getElementById('drawBtn');
            const clearBtn = document.getElementById('clearBtn');
            const cardCountSelect = document.getElementById('cardCount');
            const drawnContainer = document.getElementById('drawnCardsContainer');
            const interpretationContent = document.getElementById('interpretationContent');
            const statsDisplay = document.getElementById('statsDisplay');

            let drawnCards = [];

            drawBtn.addEventListener('click', drawCards);
            clearBtn.addEventListener('click', clearCards);

            function drawCards() {
                const count = parseInt(cardCountSelect.value);
                const shuffled = [...allCards].sort(() => 0.5 - Math.random());
                drawnCards = shuffled.slice(0, count);
                
                displayCards();
                interpretCards();
                statsDisplay.innerHTML = `<i class="fas fa-crystal-ball"></i> ${count} карти`;
            }

            function displayCards() {
                let html = '';
                drawnCards.forEach((card, index) => {
                    const imagePath = getCardImagePath(card);
                    html += `
                        <div class="drawn-card" onclick="showCardDetail(${index})">
                            <div class="drawn-card-image">
                                <img src="${imagePath}" alt="${card.name}" onerror="this.src='images/placeholder.jpg';">
                            </div>
                            <div class="drawn-card-content">
                                <div class="drawn-card-header">
                                    <span class="drawn-card-name">${card.name}</span>
                                    <span class="drawn-card-keyword">${card.keyword}</span>
                                </div>
                                <div class="drawn-card-meaning">${card.meaning}</div>
                            </div>
                        </div>
                    `;
                });
                drawnContainer.innerHTML = html;
            }

            function interpretCards() {
                if (drawnCards.length === 0) {
                    interpretationContent.innerHTML = 'Изтегли карти, за да видиш тълкувание.';
                    return;
                }
                
                const allKeywords = drawnCards.map(c => c.keyword).join(' · ');
                let html = `
                    <div style="background: linear-gradient(145deg, var(--skill-bg), var(--bg-card)); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                        <strong style="color: var(--accent);">🔑 Ключови думи:</strong>
                        <p style="margin-top: 0.5rem;">${allKeywords}</p>
                    </div>
                `;
                
                drawnCards.forEach((card, i) => {
                    html += `
                        <div style="margin-bottom: 1rem; padding: 1rem; background-color: var(--bg-card); border-radius: 12px; border-left: 4px solid var(--accent);">
                            <strong style="color: var(--accent);">${i+1}. ${card.name}</strong>
                            <p style="margin-top: 0.3rem;">${card.meaning}</p>
                        </div>
                    `;
                });
                
                interpretationContent.innerHTML = html;
            }

            window.showCardDetail = function(index) {
                const card = drawnCards[index];
                interpretationContent.innerHTML = `
                    <div style="background: linear-gradient(145deg, var(--skill-bg), var(--bg-card)); padding: 1rem; border-radius: 12px;">
                        <strong style="color: var(--accent); font-size: 1.2rem;">${card.name}</strong>
                        <p style="margin: 0.5rem 0;"><em>${card.keyword}</em></p>
                        <hr style="border-color: var(--border-color); margin: 1rem 0;">
                        <p>${card.meaning}</p>
                    </div>
                `;
            };

            function clearCards() {
                drawnCards = [];
                drawnContainer.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-secondary);"><i class="fas fa-hand-pointer" style="font-size: 3rem; margin-bottom: 1rem;"></i><p>Натисни "Тегли", за да изтеглиш карти</p></div>';
                interpretationContent.innerHTML = 'Изтегли карти, за да видиш тълкувание.';
            }
        });
    </script>
</body>
</html>
