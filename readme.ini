# Experiment626 - Online Forms Demo

This project demonstrates HTML forms with POST and GET methods, hosted on GitHub Pages.

## Live Demo
Visit: https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/

## Forms
- `Form.html` - POST form (using Formspree for backend)
- `Getform.html` - GET form demo with JavaScript

## Setup
1. Clone this repository
2. For POST forms, sign up at [Formspree](https://formspree.io) and update the form action URL
3. Push to GitHub and enable Pages

## Technologies Used
- HTML5
- JavaScript
- GitHub Pages
- Formspree (for form backend)