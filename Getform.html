<!DOCTYPE html>
<html>
<head>
    <title>Search Form (GET)</title>
    <style>
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>Search Form (GET Method)</h2>
    
    <form method="GET" onsubmit="handleSubmit(event)">
        <label for="search">Search:</label><br>
        <input type="text" id="search" name="q" required><br><br>
        
        <label for="category">Category:</label><br>
        <select id="category" name="category">
            <option value="all">All</option>
            <option value="books">Books</option>
            <option value="electronics">Electronics</option>
        </select><br><br>
        
        <button type="submit">Search</button>
    </form>
    
    <div id="results" class="result">
        <h3>Search Results:</h3>
        <p>Search parameters will appear here when you submit the form.</p>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            // Get form data
            const formData = new FormData(event.target);
            const searchParams = new URLSearchParams(formData);
            
            // Display the data
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h3>Search Results:</h3>';
            
            for (let [key, value] of searchParams.entries()) {
                resultsDiv.innerHTML += `<p><strong>${key}:</strong> ${value}</p>`;
            }
            
            // Show the URL parameters (how GET data would be sent)
            resultsDiv.innerHTML += `<p><strong>URL Parameters:</strong> ?${searchParams.toString()}</p>`;
        }
    </script>
</body>
</html>
